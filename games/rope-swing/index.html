<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>로프 스윙</title>
  <link rel="stylesheet" href="../../shared/common.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a href="../../index.html" class="back-link">← 게임 목록</a>
  <div id="app">
    <div id="start-screen" class="screen active">
      <div class="brand">Action Game</div>
      <div class="title-main">🌀 로프 스윙</div>
      <div class="title-sub">스윙해서 별을 모으고 최대한 멀리 가세요!</div>
      <div class="rule-card">
        <div class="rule-item"><div class="rule-dot">1</div><span>클릭/탭으로 가장 가까운 기둥에 로프를 겁니다.</span></div>
        <div class="rule-item"><div class="rule-dot">2</div><span>⭐ 별을 지나치면 점수 획득!</span></div>
        <div class="rule-item"><div class="rule-dot">3</div><span>바닥에 닿으면 게임 오버!</span></div>
      </div>
      <button id="start-btn" class="btn-start">시작하기 →</button>
    </div>
    <div id="game-screen" class="screen">
      <div class="hud">
        <div class="hud-item"><span class="hud-label">점수</span><span class="hud-val" id="score">0</span></div>
        <div class="hud-item"><span class="hud-label">최고</span><span class="hud-val" id="best">0</span></div>
      </div>
      <div id="login-status" class="login-status"></div>
      <canvas id="canvas"></canvas>
    </div>
  </div>
  <script type="module" src="./game.js"></script>
</body>
</html>
