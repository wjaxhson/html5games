<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Simple Clicker</title>

  <link rel="stylesheet" href="../../shared/common.css" />
  <link rel="stylesheet" href="../../shared/game-layout.css" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body class="game-page">
  <main class="game-container">
    <header class="game-header">
      <h1 class="game-title">Simple Clicker</h1>
      <a class="game-back-link" href="../../index.html">← 게임 목록</a>
    </header>

    <section class="game-panel simple-clicker-panel">
      <p id="loginStatus">로그인 확인 중...</p>

      <div id="score">0</div>

      <div class="game-actions">
        <button id="clickButton">클릭!</button>
        <button id="saveButton">직접 저장</button>
      </div>
    </section>

    <section class="game-panel game-status">
      <p id="status">저장 상태 없음</p>
    </section>
  </main>

  <script type="module" src="./game.js"></script>
</body>
</html>
