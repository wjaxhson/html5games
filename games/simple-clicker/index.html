<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Clicker</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
    }

    main {
      padding: 40px 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #score {
      font-size: 48px;
      font-weight: bold;
      margin: 30px 0;
    }

    #clickButton {
      font-size: 24px;
      padding: 20px 40px;
      border: none;
      border-radius: 12px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    #clickButton:active {
      transform: scale(0.97);
    }

    a {
      display: inline-block;
      margin-top: 30px;
      color: #333;
    }
  </style>
</head>
<body>
  <main>
    <h1>Simple Clicker</h1>
    <p>버튼을 눌러 점수를 올려보세요.</p>

    <div id="score">0</div>

    <button id="clickButton">클릭!</button>

    <br />
    <a href="../../">메인으로 돌아가기</a>
  </main>

  <script>
    const scoreEl = document.querySelector("#score");
    const clickButton = document.querySelector("#clickButton");

    let score = 0;

    clickButton.addEventListener("click", () => {
      score += 1;
      scoreEl.textContent = score;
    });
  </script>
</body>
</html>
