<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Clicker</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
    }

    main {
      padding: 40px 20px;
    }

    #score {
      font-size: 48px;
      font-weight: bold;
      margin: 30px 0;
    }

    #clickButton {
      font-size: 24px;
      padding: 20px 40px;
      border: none;
      border-radius: 12px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    #saveButton {
      margin-top: 20px;
      padding: 10px 20px;
    }

    #status {
      margin-top: 20px;
      color: #555;
    }
  </style>
</head>
<body>
  <main>
    <h1>Simple Clicker</h1>
    <p id="loginStatus">로그인 확인 중...</p>

    <div id="score">0</div>

    <button id="clickButton">클릭!</button>
    <br />
    <button id="saveButton">직접 저장</button>

    <p id="status">저장 상태 없음</p>

    <a href="../../">메인으로 돌아가기</a>
  </main>

  <script type="module" src="./game.js"></script>
</body>
</html>
