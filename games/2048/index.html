<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2048</title>
  <link rel="stylesheet" href="../../shared/common.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a href="../../index.html" class="back-link">← 게임 목록</a>

  <div id="app">
    <!-- START -->
    <div id="start-screen" class="screen active">
      <div class="brand">Puzzle Game</div>
      <div class="title-block">
        <div class="title-main">2048</div>
        <div class="title-sub">타일을 합쳐 2048을 만들어보세요!</div>
      </div>
      <div class="demo-tile">2048</div>
      <div class="rule-card">
        <div class="rule-item">
          <div class="rule-dot">1</div>
          <span>화살표 키 또는 스와이프로 타일을 움직이세요.</span>
        </div>
        <div class="rule-item">
          <div class="rule-dot">2</div>
          <span>같은 숫자끼리 만나면 합쳐집니다.</span>
        </div>
        <div class="rule-item">
          <div class="rule-dot">3</div>
          <span>2048 타일을 만들면 승리!</span>
        </div>
      </div>
      <button id="start-btn" class="btn-start">시작하기 →</button>
    </div>

    <!-- GAME -->
    <div id="game-screen" class="screen">
      <div class="hud">
        <div class="hud-left">
          <div class="score-box">
            <div class="score-label">점수</div>
            <div class="score-val" id="score">0</div>
          </div>
          <div class="score-box">
            <div class="score-label">최고</div>
            <div class="score-val" id="best-score">0</div>
          </div>
        </div>
        <button id="new-game-btn" class="btn-new">새 게임</button>
      </div>
      <div id="login-status" class="login-status"></div>
      <div id="board-wrap">
        <div id="board"></div>
        <div id="game-message" class="hidden">
          <p id="message-text"></p>
          <button id="retry-btn" class="btn-start">다시하기 →</button>
        </div>
      </div>
      <div class="dpad">
        <button class="dpad-btn" id="btn-up">▲</button>
        <div class="dpad-row">
          <button class="dpad-btn" id="btn-left">◀</button>
          <div class="dpad-center"></div>
          <button class="dpad-btn" id="btn-right">▶</button>
        </div>
        <button class="dpad-btn" id="btn-down">▼</button>
      </div>
    </div>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
