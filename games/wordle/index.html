<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>워들</title>
  <link rel="stylesheet" href="../../shared/common.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a href="../../index.html" class="back-link">← 게임 목록</a>
  <div id="app">
    <div id="start-screen" class="screen active">
      <div class="brand">Word Game</div>
      <div class="title-main">🟩 워들</div>
      <div class="title-sub">5글자 영단어를 6번 안에 맞춰보세요!</div>
      <div class="rule-card">
        <div class="rule-item"><div class="rule-dot">1</div><span>매일 새로운 5글자 영단어가 출제됩니다.</span></div>
        <div class="rule-item"><div class="rule-dot">2</div><span>🟩 초록 = 정확한 위치, 🟨 노랑 = 위치 틀림, ⬜ 회색 = 없는 글자</span></div>
        <div class="rule-item"><div class="rule-dot">3</div><span>6번 안에 맞추면 성공! 연속 성공 기록에 도전하세요.</span></div>
      </div>
      <div id="login-status" class="login-status"></div>
      <button id="start-btn" class="btn-start">시작하기 →</button>
    </div>
    <div id="game-screen" class="screen">
      <div class="hud">
        <div class="hud-item"><span class="hud-label">연속</span><span class="hud-val" id="streak">0</span></div>
        <div class="hud-item"><span class="hud-label">최고연속</span><span class="hud-val" id="best">0</span></div>
        <div class="hud-item"><span class="hud-label">시도</span><span class="hud-val" id="attempts">0/6</span></div>
      </div>
      <div id="board"></div>
      <div id="message"></div>
      <div id="keyboard"></div>
    </div>
  </div>
  <script type="module" src="./game.js"></script>
</body>
</html>
