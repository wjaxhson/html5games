<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal Miner</title>
  <link rel="stylesheet" href="../../shared/common.css">
  <link rel="stylesheet" href="../../shared/game-layout.css">
  <link rel="stylesheet" href="./style.css">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111827;
      color: white;
      text-align: center;
    }

    main {
      padding: 30px;
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .resource {
      font-size: 36px;
      margin: 20px 0;
    }

    .panel {
      background: #1f2937;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 15px 20px;
      font-size: 18px;
      cursor: pointer;
      margin: 5px;
    }

    #mineButton {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      font-size: 28px;
      background: #7c3aed;
      color: white;
    }

    #mineButton:active {
      transform: scale(0.96);
    }

    .buyButton {
      width: 100%;
      background: #2563eb;
      color: white;
    }

    .saveButton {
      background: #059669;
      color: white;
    }

    #status {
      margin-top: 20px;
      color: #9ca3af;
    }

    a {
      color: #93c5fd;
      display: inline-block;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Crystal Miner</h1>

    <p id="loginStatus">로그인 확인 중...</p>

    <div class="resource">
      💎 수정: <span id="crystalText">0</span>
    </div>

    <div>
      초당 생산량:
      <span id="perSecondText">0</span>
    </div>

    <button id="mineButton">
      채굴
    </button>

    <div class="panel">
      <h2>자동 채굴기</h2>

      <p>
        보유 수:
        <span id="minerCountText">0</span>
      </p>

      <p>
        구매 비용:
        <span id="minerCostText">10</span>
      </p>

      <button
        id="buyMinerButton"
        class="buyButton"
      >
        자동 채굴기 구매
      </button>
    </div>

    <div class="panel">
      <button
        id="saveButton"
        class="saveButton"
      >
        직접 저장
      </button>

      <p id="status">
        저장 준비 중...
      </p>
    </div>

    <a href="../../">
      메인으로 돌아가기
    </a>
  </main>

  <script type="module" src="./game.js"></script>
</body>
</html>
