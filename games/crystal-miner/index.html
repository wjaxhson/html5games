<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Crystal Miner</title>

  <link rel="stylesheet" href="../../shared/common.css" />
  <link rel="stylesheet" href="../../shared/game-layout.css" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body class="game-page">
  <main class="game-container">
    <header class="game-header">
      <h1 class="game-title">Crystal Miner</h1>
      <a class="game-back-link" href="../../index.html">← 게임 목록</a>
    </header>

    <section class="game-panel crystal-miner-panel">
      <p id="loginStatus">로그인 확인 중...</p>

      <div class="resource">
        수정: <span id="crystalText">0</span>
      </div>

      <p class="production-text">
        초당 생산량:
        <span id="perSecondText">0</span>
      </p>

      <button id="mineButton">채굴</button>
    </section>

    <section class="game-panel">
      <h2>자동 채굴기</h2>

      <p>
        보유 수:
        <span id="minerCountText">0</span>
      </p>

      <p>
        구매 비용:
        <span id="minerCostText">10</span>
      </p>

      <div class="game-actions">
        <button id="buyMinerButton" class="buyButton">
          자동 채굴기 구매
        </button>
      </div>
    </section>

    <section class="game-panel game-status">
      <div class="game-actions">
        <button id="saveButton" class="saveButton">
          직접 저장
        </button>
      </div>

      <p id="status">저장 준비 중...</p>
    </section>
  </main>

  <script type="module" src="./game.js"></script>
</body>
</html>
