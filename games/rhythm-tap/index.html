<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>리듬 탭</title>
  <link rel="stylesheet" href="../../shared/common.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a href="../../index.html" class="back-link">← 게임 목록</a>
  <div id="app">
    <div id="start-screen" class="screen active">
      <div class="brand">Rhythm Game</div>
      <div class="title-main">🎶 리듬 탭</div>
      <div class="title-sub">타이밍에 맞춰 탭하세요!</div>
      <div class="rule-card">
        <div class="rule-item"><div class="rule-dot">1</div><span>원이 바깥에서 안쪽으로 수축합니다.</span></div>
        <div class="rule-item"><div class="rule-dot">2</div><span>원이 타겟 링과 겹칠 때 탭! 타이밍이 정확할수록 높은 점수.</span></div>
        <div class="rule-item"><div class="rule-dot">3</div><span>Miss 3번이면 게임 오버!</span></div>
      </div>
      <button id="start-btn" class="btn-start">시작하기 →</button>
    </div>
    <div id="game-screen" class="screen">
      <div class="hud">
        <div class="hud-item"><span class="hud-label">점수</span><span class="hud-val" id="score">0</span></div>
        <div class="hud-item"><span class="hud-label">콤보</span><span class="hud-val" id="combo">0</span></div>
        <div class="hud-item"><span class="hud-label">목숨</span><span class="hud-val" id="lives">❤️❤️❤️</span></div>
        <div class="hud-item"><span class="hud-label">최고</span><span class="hud-val" id="best">0</span></div>
      </div>
      <div id="login-status" class="login-status"></div>
      <canvas id="canvas"></canvas>
      <div id="feedback" class="feedback"></div>
    </div>
  </div>
  <script type="module" src="./game.js"></script>
</body>
</html>
