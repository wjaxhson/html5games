<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>One More Rule</title>
  <link rel="stylesheet" href="../../shared/common.css" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      background: radial-gradient(circle at top, #172033 0%, #08111f 58%, #050914 100%);
      color: #f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .omr-page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .omr-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .omr-title {
      margin: 0;
      text-align: center;
      font-size: clamp(36px, 9vw, 56px);
      line-height: 1;
      letter-spacing: -1px;
    }

    .omr-title span {
      color: #60a5fa;
    }

    .omr-subtitle {
      margin: 10px 0 18px;
      text-align: center;
      color: #cbd5e1;
      font-weight: 700;
    }

    button {
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 12px 16px;
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .omr-menu-btn {
      width: 54px;
      height: 54px;
      padding: 0;
      background: rgba(15, 23, 42, 0.9);
      font-size: 24px;
    }

    .omr-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .omr-card {
      border: 1px solid #334155;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.78);
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.25);
    }

    .omr-stat {
      padding: 14px;
      text-align: center;
    }

    .omr-stat-label {
      color: #e2e8f0;
      font-weight: 800;
      font-size: 14px;
    }

    .omr-stat-value {
      margin-top: 6px;
      color: #60a5fa;
      font-size: 28px;
      font-weight: 900;
    }

    .omr-rule {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px;
      margin-bottom: 18px;
    }

    .omr-rule-icon {
      flex: 0 0 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: #334155;
      font-size: 28px;
    }

    .omr-rule-title {
      color: #60a5fa;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .omr-rule-desc {
      color: #e5e7eb;
      font-size: 14px;
      line-height: 1.45;
      word-break: keep-all;
    }

    .omr-board-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    #gameCanvas {
      display: block;
      width: min(100%, 520px);
      height: auto;
      aspect-ratio: 1 / 1;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 14px;
      box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
      touch-action: none;
    }

    .omr-controls-panel {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 16px;
    }

    .omr-controls-title {
      color: #60a5fa;
      font-size: 20px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 6px;
    }

    .omr-message {
      min-height: 22px;
      text-align: center;
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 14px;
      word-break: keep-all;
    }

    .omr-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 12px;
      border: 1px solid #334155;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.75);
    }

    .omr-controls button {
      height: 56px;
      font-size: 24px;
      border-radius: 12px;
    }

    .omr-controls .empty {
      visibility: hidden;
    }

    @media (max-width: 520px) {
      .omr-stats {
        grid-template-columns: 1fr;
      }

      .omr-rule {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="omr-page">
    <div class="omr-top">
      <button id="backBtn" class="omr-menu-btn">☰</button>
      <button id="resetBtn">↻ 다시 시작</button>
    </div>

    <h1 class="omr-title">One More <span>Rule</span></h1>
    <p class="omr-subtitle">한 칸 너머, 새로운 규칙이 추가됩니다</p>

    <section class="omr-stats">
      <div class="omr-card omr-stat">
        <div class="omr-stat-label">현재 맵</div>
        <div id="mapInfo" class="omr-stat-value">0, 0</div>
      </div>
      <div class="omr-card omr-stat">
        <div class="omr-stat-label">점수</div>
        <div id="scoreInfo" class="omr-stat-value">0</div>
      </div>
      <div class="omr-card omr-stat">
        <div class="omr-stat-label">누적 규칙</div>
        <div id="ruleCountInfo" class="omr-stat-value">0개</div>
      </div>
    </section>

    <section class="omr-card omr-rule">
      <div id="ruleIcon" class="omr-rule-icon">▫️</div>
      <div>
        <div id="ruleInfo" class="omr-rule-title">기본 규칙</div>
        <div id="featureList" class="omr-rule-desc">아직 추가된 규칙이 없습니다.</div>
      </div>
    </section>

    <div class="omr-board-wrap">
      <canvas id="gameCanvas" width="500" height="500"></canvas>
    </div>

    <section class="omr-card omr-controls-panel">
      <div class="omr-controls-title">조작 방법</div>
      <div id="message" class="omr-message">방향키 또는 아래 버튼으로 이동하세요.</div>

      <div class="omr-controls">
        <button class="empty">-</button>
        <button data-dir="up">⬆</button>
        <button class="empty">-</button>
        <button data-dir="left">⬅</button>
        <button data-dir="down">⬇</button>
        <button data-dir="right">➡</button>
      </div>
    </section>
  </main>

  <script type="module" src="./game.js"></script>
</body>
</html>
