<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>스트루프 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="app">

  <!-- START -->
  <div id="start-screen" class="screen active">
    <div class="brand">Cognitive Test</div>
    <div class="title-block">
      <div class="title-main">스트루프<br>테스트</div>
      <div class="title-sub">글자 색깔이 뭔지 맞혀보세요</div>
    </div>
    <div class="demo-word" id="demo-word" style="color:#e74c3c">파랑</div>
    <div class="rule-card">
      <div class="rule-item">
        <div class="rule-dot">1</div>
        <span>화면에 색깔 이름이 나타납니다. 단, 글자 색깔과 내용이 다를 수 있어요.</span>
      </div>
      <div class="rule-item">
        <div class="rule-dot">2</div>
        <span>4개 버튼 중 <strong>글자의 색깔</strong>과 일치하는 버튼을 누르세요.</span>
      </div>
      <div class="rule-item">
        <div class="rule-dot">3</div>
        <span>5문제 연속 성공하면 클리어! 한 번이라도 틀리면 즉시 탈락.</span>
      </div>
    </div>
    <button class="btn-start" onclick="startGame()">시작하기 →</button>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="screen">
    <div class="progress-row">
      <div class="progress-label" id="prog-label">1 / 5</div>
      <div class="progress-dots" id="prog-dots"></div>
    </div>
    <div class="question-card fadein" id="question-card">
      <div class="q-label">글자의 색깔은?</div>
      <div class="q-word" id="q-word">빨강</div>
      <div class="q-instruction">글자에 칠해진 색을 고르세요</div>
    </div>
    <div class="buttons-grid" id="buttons-grid"></div>
  </div>

  <!-- RESULT -->
  <div id="result-screen" class="screen">
    <div class="result-card fadein" id="result-card">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-title" id="result-title">성공!</div>
      <div class="result-sub" id="result-sub">5문제 모두 맞혔어요</div>
      <div class="result-stats" id="result-stats"></div>
      <div class="review-list" id="review-list"></div>
    </div>
    <button class="btn-start" onclick="startGame()">다시하기 →</button>
  </div>

</div>

<div id="feedback"><div id="feedback-inner"></div></div>
<script type="module" src="./game.js"></script>
</body>
</html>
