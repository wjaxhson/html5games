<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>사이먼 게임</title>
  <link rel="stylesheet" href="../../shared/common.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a href="../../index.html" class="back-link">← 게임 목록</a>
  <div id="app">
    <div id="start-screen" class="screen active">
      <div class="brand">Memory Game</div>
      <div class="title-main">🎵 사이먼 게임</div>
      <div class="title-sub">색상 순서를 기억하고 따라하세요!</div>
      <div class="rule-card">
        <div class="rule-item"><div class="rule-dot">1</div><span>사이먼이 색상 순서를 보여줍니다. 잘 보세요!</span></div>
        <div class="rule-item"><div class="rule-dot">2</div><span>같은 순서대로 버튼을 누르세요.</span></div>
        <div class="rule-item"><div class="rule-dot">3</div><span>그리드가 클수록 더 어렵습니다!</span></div>
      </div>
      <div class="diff-row">
        <button class="diff-btn active" data-mode="2">2×2<br><small>4색 · 기본</small></button>
        <button class="diff-btn" data-mode="3">3×3<br><small>9색 · 보통</small></button>
        <button class="diff-btn" data-mode="4">4×4<br><small>16색 · 어려움</small></button>
      </div>
      <div id="login-status" class="login-status"></div>
      <button id="start-btn" class="btn-start">시작하기 →</button>
    </div>
    <div id="game-screen" class="screen">
      <div class="info-row">
        <div class="info-box"><div class="info-label">라운드</div><div class="info-val" id="round">0</div></div>
        <div class="info-box"><div class="info-label">최고</div><div class="info-val" id="best">0</div></div>
        <div class="info-status" id="status">준비 중...</div>
      </div>
      <div class="simon-board" id="simon-board"></div>
    </div>
    <div id="result-screen" class="screen">
      <div class="result-card">
        <div id="r-emoji" class="r-emoji"></div>
        <div id="r-round" class="r-round"></div>
        <div id="r-sub" class="r-sub"></div>
      </div>
      <button id="retry-btn" class="btn-start">다시하기 →</button>
    </div>
  </div>
  <script type="module" src="./game.js"></script>
</body>
</html>
