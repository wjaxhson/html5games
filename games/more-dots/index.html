<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>더 많은 점 고르기</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c28;
    --border: rgba(255,255,255,0.07);
    --left: #4f9eff;
    --right: #ff6b6b;
    --accent: #ffe066;
    --text: #f0f0f8;
    --muted: rgba(240,240,248,0.45);
    --success: #4dffb4;
    --fail: #ff4d6a;
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Gmarket Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(79,158,255,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(255,107,107,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #wrap {
    position: relative;
    z-index: 1;
    width: min(420px, 100vw);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 14px 20px;
    gap: 10px;
  }

  #hud {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    flex-shrink: 0;
  }

  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 8px 6px;
    text-align: center;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .stat-val {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    line-height: 1.2;
  }
  #score-val { color: var(--accent); }
  #lives-val { font-size: 16px; letter-spacing: 1px; }
  #best-val  { color: var(--success); }

  #timer-track {
    width: 100%;
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
    flex-shrink: 0;
  }
  #timer-fill {
    height: 100%;
    border-radius: 99px;
    width: 100%;
    transition: width 0.08s linear, background 0.4s;
    background: var(--success);
  }

  #game-area {
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 0;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    background: var(--surface);
    touch-action: none;
  }

  #labels {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 14px 20px;
    pointer-events: none;
    z-index: 2;
  }
  .side-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 8px;
  }
  .label-left  { color: var(--left);  background: rgba(79,158,255,0.12); }
  .label-right { color: var(--right); background: rgba(255,107,107,0.12); }

  #flash {
    position: absolute; inset: 0;
    border-radius: var(--radius);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.08s;
    z-index: 3;
  }
  #flash.show { opacity: 1; }
  #flash.correct { background: rgba(77,255,180,0.10); border: 2px solid rgba(77,255,180,0.35); }
  #flash.wrong   { background: rgba(255,77,106,0.12); border: 2px solid rgba(255,77,106,0.40); }
  #flash.timeout { background: rgba(255,200,0,0.10);  border: 2px solid rgba(255,200,0,0.35); }

  .divider-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 32px; height: 32px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    pointer-events: none;
    z-index: 2;
    color: var(--muted);
  }

  #overlay {
    position: absolute; inset: 0;
    border-radius: var(--radius);
    background: rgba(10,10,15,0.93);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 10;
    padding: 32px 24px;
  }
  #overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    letter-spacing: -0.02em;
    text-align: center;
    line-height: 1.2;
  }
  .overlay-sub {
    font-size: 14px;
    font-weight: 300;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
  }
  .big-score {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 64px;
    color: var(--accent);
    line-height: 1;
  }
  .score-label { font-size: 12px; color: var(--muted); margin-top: -6px; }

  .btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 50px;
    padding: 13px 40px;
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
  }
  .btn:active { transform: scale(0.95); opacity: 0.85; }

  #msg {
    font-size: 13px;
    font-weight: 500;
    height: 18px;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  #msg.correct { color: var(--success); }
  #msg.wrong   { color: var(--fail); }
  #msg.timeout { color: var(--accent); }

  .star {
    position: fixed;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  
  .back-link {
    align-self: flex-start;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    padding: 4px 2px;
  }
  
  .back-link:hover {
    color: var(--text);
  }
</style>
</head>
<body>

<div id="wrap">
  <div id="hud">
    <div class="stat">
      <div class="stat-label">점수</div>
      <div class="stat-val" id="score-val">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">라이프</div>
      <div class="stat-val" id="lives-val">❤️❤️❤️</div>
    </div>
    <div class="stat">
      <div class="stat-label">최고</div>
      <div class="stat-val" id="best-val">0</div>
    </div>
  </div>

  <div id="timer-track"><div id="timer-fill"></div></div>

  <div id="game-area">
    <canvas id="canvas"></canvas>
    <div id="labels">
      <span class="side-label label-left">왼쪽</span>
      <span class="side-label label-right">오른쪽</span>
    </div>
    <div class="divider-label">VS</div>
    <div id="flash"></div>
    <div id="overlay">
      <div class="overlay-title">더 많은<br>점 고르기</div>
      <div class="overlay-sub">점이 더 많은 쪽을 탭하세요<br>틀리거나 시간 초과 시 ❤️ -1<br>❤️ 3개 모두 소진 시 게임 종료</div>
      <button class="btn" onclick="startGame()">게임 시작</button>
    </div>
  </div>

  <div id="msg"></div>
</div>
  
<a href="../../index.html" class="back-link">← 게임 목록</a>

<script>
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top  = Math.random() * 100 + 'vh';
  s.style.opacity = (Math.random() * 0.35 + 0.08).toFixed(2);
  const sz = (Math.random() < 0.3 ? 3 : 2) + 'px';
  s.style.width = s.style.height = sz;
  document.body.appendChild(s);
}

const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const overlay   = document.getElementById('overlay');
const flash     = document.getElementById('flash');
const msgEl     = document.getElementById('msg');
const timerFill = document.getElementById('timer-fill');
const scoreEl   = document.getElementById('score-val');
const livesEl   = document.getElementById('lives-val');
const bestEl    = document.getElementById('best-val');

const MAX_LIVES    = 3;
const LEFT_COLORS  = ['#4f9eff','#80b4ff','#2a78e0','#a0c8ff'];
const RIGHT_COLORS = ['#ff6b6b','#ff9090','#e03030','#ffaaaa'];

let W = 0, H = 0;

function resize() {
  const area = document.getElementById('game-area');
  const rect  = area.getBoundingClientRect();
  W = Math.round(rect.width  * devicePixelRatio);
  H = Math.round(rect.height * devicePixelRatio);
  canvas.width  = W;
  canvas.height = H;
}
requestAnimationFrame(resize);
window.addEventListener('resize', () => { resize(); if (state === 'playing') newRound(); });

let state = 'idle';
let score = 0, level = 1, lives = MAX_LIVES, best = 0, roundsWon = 0;
let timeLeft = 0, maxTime = 0;
let dotsLeft = [], dotsRight = [], correctSide = null;
let animId = null, lastTs = null;
let particles = [];

function livesStr(n) {
  return '❤️'.repeat(Math.max(0, n)) + '🖤'.repeat(Math.max(0, MAX_LIVES - n));
}

function getTimeMs(lvl) { return Math.max(1400, 3400 - lvl * 130); }

function getDotCounts(lvl) {
  const base = Math.min(5 + Math.floor(lvl * 1.2), 22);
  const top  = Math.min(base + 8, 35);
  const a    = base + Math.floor(Math.random() * (top - base));
  const diff = Math.max(1, Math.floor(Math.random() * Math.max(2, 5 - Math.floor(lvl / 3))) + 1);
  return Math.random() < 0.5 ? [a, a + diff] : [a + diff, a];
}

function placeDots(count, x0, x1, y0, y1) {
  const r = Math.max(4 * devicePixelRatio, Math.round((10 - level * 0.35) * devicePixelRatio));
  const out = [];
  let tries = 0;
  while (out.length < count && tries < 1000) {
    tries++;
    const rangeX = x1 - x0 - r * 2;
    const rangeY = y1 - y0 - r * 2;
    if (rangeX <= 0 || rangeY <= 0) break;
    const x = x0 + r + Math.random() * rangeX;
    const y = y0 + r + Math.random() * rangeY;
    let ok = true;
    for (const d of out) {
      const dx = d.x - x, dy = d.y - y;
      if (Math.sqrt(dx*dx + dy*dy) < r * 2.4) { ok = false; break; }
    }
    if (ok) out.push({ x, y, r, phase: Math.random() * Math.PI * 2 });
  }
  return out;
}

function newRound() {
  const [lc, rc] = getDotCounts(level);
  correctSide = lc > rc ? 'left' : 'right';
  const dpr = devicePixelRatio;
  const pad = 10 * dpr;
  const mid = W / 2;
  dotsLeft  = placeDots(lc, pad,       mid - pad, pad, H - pad);
  dotsRight = placeDots(rc, mid + pad, W - pad,   pad, H - pad);
  maxTime   = getTimeMs(level);
  timeLeft  = maxTime;
  particles = [];
}

function startGame() {
  score = 0; level = 1; lives = MAX_LIVES; roundsWon = 0;
  scoreEl.textContent = '0';
  livesEl.textContent = livesStr(lives);
  overlay.classList.add('hidden');
  state = 'playing';
  resize();
  newRound();
  lastTs = null;
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function loseLife(reason) {
  if (state === 'over') return;
  lives = Math.max(0, lives - 1);
  livesEl.textContent = livesStr(lives);

  flash.className = 'show ' + (reason === 'timeout' ? 'timeout' : 'wrong');
  setTimeout(() => { flash.className = ''; }, 380);

  msgEl.textContent = reason === 'timeout' ? '시간 초과! ❤️ -1' : '틀렸어요! ❤️ -1';
  msgEl.className   = reason === 'timeout' ? 'timeout' : 'wrong';
  setTimeout(() => { msgEl.textContent = ''; msgEl.className = ''; }, 950);

  if (lives <= 0) {
    state = 'over';
    setTimeout(showGameOver, 420);
  } else {
    state = 'flash';
    setTimeout(() => { if (state === 'flash') { state = 'playing'; newRound(); } }, 420);
  }
}

function spawnParticles(cx, cy, ok) {
  const colors = ok ? ['#4dffb4','#80ffcc','#00e899'] : ['#ff4d6a','#ff8090','#cc2040'];
  for (let i = 0; i < 20; i++) {
    const angle = (Math.PI * 2 * i / 20) + Math.random() * 0.3;
    const speed = (3 + Math.random() * 4) * devicePixelRatio;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2 * devicePixelRatio,
      r: (3 + Math.random() * 3) * devicePixelRatio,
      life: 1,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

function handleTap(px, py) {
  if (state !== 'playing') return;
  const side = px < W / 2 ? 'left' : 'right';
  const ok   = side === correctSide;
  spawnParticles(side === 'left' ? W / 4 : 3 * W / 4, H / 2, ok);

  if (ok) {
    const gain = Math.ceil(timeLeft / 180);
    score += gain;
    roundsWon++;
    if (roundsWon % 5 === 0) level = Math.min(level + 1, 18);
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }

    flash.className = 'show correct';
    setTimeout(() => { flash.className = ''; }, 280);
    msgEl.textContent = '+' + gain + '점 정답!';
    msgEl.className = 'correct';
    setTimeout(() => { msgEl.textContent = ''; msgEl.className = ''; }, 800);

    state = 'flash';
    setTimeout(() => { if (state === 'flash') { state = 'playing'; newRound(); } }, 320);
  } else {
    loseLife('wrong');
  }
}

function drawFrame(ts) {
  ctx.clearRect(0, 0, W, H);
  const dpr = devicePixelRatio;
  const mid = W / 2;

  ctx.fillStyle = 'rgba(79,158,255,0.04)';
  ctx.fillRect(0, 0, mid, H);
  ctx.fillStyle = 'rgba(255,107,107,0.04)';
  ctx.fillRect(mid, 0, mid, H);

  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1.5 * dpr;
  ctx.setLineDash([8 * dpr, 8 * dpr]);
  ctx.beginPath(); ctx.moveTo(mid, 0); ctx.lineTo(mid, H);
  ctx.stroke();
  ctx.restore();

  const t = ts * 0.001;
  function drawDots(list, colors) {
    for (const d of list) {
      const pulse = 1 + Math.sin(t * 2.5 + d.phase) * 0.06;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r * pulse, 0, Math.PI * 2);
      ctx.fillStyle = colors[Math.floor(d.phase * 10) % colors.length];
      ctx.fill();
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r * pulse * 1.8, 0, Math.PI * 2);
      ctx.fillStyle = colors[0];
      ctx.fill();
      ctx.restore();
    }
  }
  drawDots(dotsLeft,  LEFT_COLORS);
  drawDots(dotsRight, RIGHT_COLORS);

  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = ts - lastTs;
  lastTs = ts;

  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.18 * devicePixelRatio;
    p.life -= dt / 480;
  }
  particles = particles.filter(p => p.life > 0);

  if (state === 'playing') {
    timeLeft = Math.max(0, timeLeft - dt);
    const pct = timeLeft / maxTime;
    timerFill.style.width      = (pct * 100) + '%';
    timerFill.style.background = pct > 0.55 ? '#4dffb4' : pct > 0.28 ? '#ffe066' : '#ff4d6a';
    if (timeLeft <= 0) loseLife('timeout');
  }

  drawFrame(ts);
  if (state !== 'over') animId = requestAnimationFrame(loop);
}

function showGameOver() {
  if (score > best) { best = score; bestEl.textContent = best; }
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <div class="overlay-title">게임 오버</div>
    <div style="text-align:center">
      <div class="big-score">${score}</div>
      <div class="score-label">점</div>
    </div>
    <div class="overlay-sub">최고 기록: <strong style="color:var(--success)">${best}점</strong><br>레벨 ${level}까지 도달!</div>
    <button class="btn" onclick="startGame()">다시 하기</button>
  `;
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) / rect.width  * W;
  const py = (e.clientY - rect.top)  / rect.height * H;
  handleTap(px, py);
}, { passive: false });
</script>
</body>
</html>
