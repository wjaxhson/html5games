<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Upgrade Clicker</title>

  <link rel="stylesheet" href="../../shared/common.css" />
  <link rel="stylesheet" href="../../shared/game-layout.css" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body class="game-page">
  <main class="game-container">
    <header class="game-header">
      <h1 class="game-title">Upgrade Clicker</h1>
      <a class="game-back-link" href="../../index.html">← 게임 목록</a>
    </header>

    <section class="game-panel upgrade-clicker-panel">
      <p id="loginStatus">로그인 확인 중...</p>

      <h2 id="scoreText">점수: 0</h2>
      <p id="powerText">클릭 파워: 1</p>
      <p id="upgradeText">업그레이드 비용: 10</p>

      <div class="game-actions">
        <button id="clickButton">클릭!</button>
        <button id="upgradeButton">클릭 파워 업그레이드</button>
        <button id="saveButton">직접 저장</button>
      </div>
    </section>

    <section class="game-panel game-status">
      <p id="status">자동 저장 준비 중...</p>
    </section>
  </main>

  <script type="module" src="./game.js"></script>
</body>
</html>
