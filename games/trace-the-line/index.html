<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>줄 따라 긋기</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="header">
  <div class="title-row">
    <div class="game-title">줄 따라 긋기</div>
    <a href="../../index.html" class="back-link">← 게임 목록</a>
    <div class="level-badge" id="levelLabel">LV.1 — 쉬움</div>
  </div>
  <div class="info-bar">
    <div class="info-box">
      <div class="info-label">TIME</div>
      <div class="info-value" id="timerDisplay">10</div>
    </div>
    <div class="info-box">
      <div class="info-label">SCORE</div>
      <div class="info-value gold" id="scoreDisplay">0</div>
    </div>
    <div class="info-box">
      <div class="info-label">STAGE</div>
      <div class="info-value" id="stageDisplay">1</div>
    </div>
  </div>
  <div class="timer-track">
    <div class="timer-fill" id="timerFill"></div>
  </div>
  <div class="accuracy-row">
    <div class="acc-label">정확도</div>
    <div class="acc-track"><div class="acc-fill" id="accFill" style="width:0%"></div></div>
    <div class="acc-value" id="accValue">—</div>
  </div>
</div>

<div class="canvas-wrap">
  <div class="canvas-container" id="canvasContainer">
    <canvas id="gameCanvas"></canvas>

    <!-- 시작 오버레이 -->
    <div class="overlay" id="startOverlay">
      <div class="overlay-icon">✏️</div>
      <div class="overlay-title">줄 따라 긋기</div>
      <div class="overlay-sub">가이드 선을 벗어나지 않고<br>시작점부터 끝점까지 그으세요<br>10초 안에 완성하면 포인트 지급!</div>
      <div class="level-select">
        <div class="lv-btn active" data-lv="0">쉬움</div>
        <div class="lv-btn" data-lv="1">보통</div>
        <div class="lv-btn" data-lv="2">어려움</div>
      </div>
      <button class="btn" id="startBtn">시작하기</button>
    </div>

    <!-- 결과 오버레이 -->
    <div class="overlay hidden" id="resultOverlay">
      <div class="overlay-icon" id="resultIcon">🎉</div>
      <div class="overlay-title" id="resultTitle">성공!</div>
      <div class="overlay-score" id="resultScore">98%</div>
      <div class="overlay-score-label">최종 정확도</div>
      <div class="result-details">
        <div class="result-item">
          <div class="result-item-val" id="resTime">7.2s</div>
          <div class="result-item-label">완료 시간</div>
        </div>
        <div class="result-item">
          <div class="result-item-val" id="resOff">3</div>
          <div class="result-item-label">이탈 횟수</div>
        </div>
        <div class="result-item">
          <div class="result-item-val" id="resStage">1</div>
          <div class="result-item-label">스테이지</div>
        </div>
      </div>
      <div class="point-badge" id="pointBadge">🪙 +50 포인트 지급!</div>
      <button class="btn" id="retryBtn">다시 도전</button>
    </div>
  </div>
</div>

<div class="hint" id="hintText">시작점(●)에 손가락을 대고 끝점(★)까지 선을 따라 그으세요</div>


<script type="module" src="./game.js"></script>
</body>
</html>
