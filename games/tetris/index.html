<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>테트리스</title>
  <link rel="stylesheet" href="../../shared/common.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a href="../../index.html" class="back-link">← 게임 목록</a>
  <div id="app">
    <div id="start-screen" class="screen active">
      <div class="brand">Puzzle Game</div>
      <div class="title-main">🟦 테트리스</div>
      <div class="title-sub">블록을 쌓아 줄을 지워보세요!</div>
      <div class="rule-card">
        <div class="rule-item"><div class="rule-dot">1</div><span>← → 이동 / ↑ 회전 / ↓ 빠르게 / Space 즉시 낙하</span></div>
        <div class="rule-item"><div class="rule-dot">2</div><span>한 줄이 꽉 차면 사라지고 점수를 얻습니다.</span></div>
        <div class="rule-item"><div class="rule-dot">3</div><span>10줄마다 레벨 업! 속도가 빨라집니다.</span></div>
      </div>
      <button id="start-btn" class="btn-start">시작하기 →</button>
    </div>
    <div id="game-screen" class="screen">
      <div class="game-top">
        <div class="info-box"><div class="info-label">점수</div><div class="info-val" id="score">0</div></div>
        <div class="info-box"><div class="info-label">최고</div><div class="info-val" id="best">0</div></div>
        <div class="info-box"><div class="info-label">레벨</div><div class="info-val" id="level">1</div></div>
        <div class="info-box"><div class="info-label">줄</div><div class="info-val" id="lines">0</div></div>
      </div>
      <div id="login-status" class="login-status"></div>
      <div class="play-area">
        <canvas id="canvas"></canvas>
        <div class="side-panel">
          <div class="side-label">다음</div>
          <canvas id="next-canvas"></canvas>
        </div>
      </div>
      <div id="overlay" class="hidden">
        <div id="ov-title"></div>
        <div id="ov-sub"></div>
        <button id="ov-btn" class="btn-start">다시하기 →</button>
      </div>
      <div class="mobile-btns">
        <button class="mb" id="mb-left">◀</button>
        <button class="mb" id="mb-rotate">↻</button>
        <button class="mb" id="mb-right">▶</button>
        <button class="mb" id="mb-down">▼</button>
        <button class="mb" id="mb-drop">⬇</button>
      </div>
    </div>
  </div>
  <script type="module" src="./game.js"></script>
</body>
</html>
