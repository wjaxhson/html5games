<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경로 기억하기</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f0;
    --muted: #666680;
    --accent: #c8ff00;
    --path-color: #3d8eff;
    --path-dim: rgba(61,142,255,0.15);
    --start: #00e5a0;
    --end: #ff6b35;
    --wrong: #ff3d6b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,255,0,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  #app { width: 100%; max-width: 620px; }

  /* HEADER */
  .header { margin-bottom: 28px; }
  .title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .title span { color: var(--accent); }
  .subtitle { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* PIPS */
  .rounds-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .round-pip {
    flex: 1; height: 4px; border-radius: 2px;
    background: var(--surface2); transition: background 0.3s;
    position: relative; overflow: hidden;
  }
  .round-pip.done { background: var(--accent); }
  .round-pip.active::after {
    content: ''; position: absolute; left:0; top:0; height:100%; width:100%;
    background: var(--accent); transform-origin: left; transform: scaleX(0);
    animation: pip-fill var(--dur, 30s) linear forwards;
  }
  @keyframes pip-fill { from{transform:scaleX(0)} to{transform:scaleX(1)} }
  .round-pip.fail { background: var(--wrong); }

  /* STATUS */
  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
  }
  .status-msg { font-size: 13px; color: var(--muted); min-height: 20px; flex: 1; transition: color 0.2s; }
  .status-msg.hi  { color: var(--accent); }
  .status-msg.bad { color: var(--wrong); }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    font-size: 11px; padding: 3px 10px;
    border: 1px solid var(--border); border-radius: 20px;
    background: var(--surface); color: var(--muted); white-space: nowrap;
  }
  .chip strong { color: var(--text); font-weight: 500; }
  #timer-num { font-size: 13px; color: var(--muted); min-width: 28px; text-align:right; }
  #timer-num.urgent { color: var(--wrong); }

  /* GRID */
  .grid-outer {
    display: block; position: relative;
    border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; background: var(--surface); width: 100%;
  }
  #grid {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 1px; background: var(--border);
  }
  .cell {
    aspect-ratio: 1; background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, transform 0.08s;
    position: relative; user-select: none; cursor: default;
  }
  .cell .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--muted); opacity: 0.18; transition: all 0.15s;
  }
  .cell.start .dot { background: var(--start); opacity:1; width:16px; height:16px; box-shadow: 0 0 12px var(--start); }
  .cell.end .dot   { background: var(--end);   opacity:1; width:16px; height:16px; box-shadow: 0 0 12px var(--end); }

  /* path-show = all revealed cells (dimmer) */
  .cell.path-show { background: var(--path-dim); }
  .cell.path-show .dot { background: var(--path-color); opacity:0.6; width:12px; height:12px; }

  /* path-active = currently appearing cell (bright pulse) */
  .cell.path-active { background: rgba(61,142,255,0.3); }
  .cell.path-active .dot { background: var(--path-color); opacity:1; width:17px; height:17px; box-shadow: 0 0 14px var(--path-color); }

  .cell.selected-ok { background: rgba(61,142,255,0.18); }
  .cell.selected-ok .dot { background: var(--path-color); opacity:1; width:14px; height:14px; }
  .cell.correct-reveal { background: rgba(0,229,160,0.1); }
  .cell.correct-reveal .dot { background: var(--start); opacity:0.8; width:12px; height:12px; }
  .cell.wrong-reveal { background: rgba(255,61,107,0.1); }
  .cell.wrong-reveal .dot { background: var(--wrong); opacity:0.8; width:12px; height:12px; }
  .cell.clickable { cursor: pointer; }
  .cell.clickable:hover { background: var(--surface2); transform: scale(0.95); }
  .cell.clickable:active { transform: scale(0.91); }
  .cell.flash-ok { animation: flash-ok 0.22s; }
  @keyframes flash-ok { 50%{background:rgba(0,229,160,0.28);} }

  /* NEXT OVERLAY — over the grid */
  #next-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(13,13,15,0.86);
    backdrop-filter: blur(6px);
    border-radius: 15px;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; z-index: 20;
  }
  #next-overlay.visible { display: flex; }
  .next-label {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
    color: var(--accent); letter-spacing: -0.3px;
  }
  .next-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 4px; }
  .next-countdown {
    font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800;
    color: var(--text); line-height: 1; margin: 4px 0;
    transition: color 0.3s;
  }
  .next-countdown.urgent { color: var(--wrong); }
  #btn-next-round {
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700;
    padding: 11px 32px; border-radius: 8px; border: none;
    background: var(--accent); color: #0d0d0f;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
    margin-top: 8px;
  }
  #btn-next-round:hover { background: #d9ff33; }
  #btn-next-round:active { transform: scale(0.97); }



  /* SCREENS */
  .screen { text-align: center; padding: 48px 24px; display: none; }
  .screen.visible { display: block; }
  .screen-title { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; margin-bottom: 12px; }
  .screen-title.clear { color: var(--accent); }
  .screen-title.fail  { color: var(--wrong); }
  .screen-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; line-height: 2; white-space: pre-line; }
  .round-tags { display:flex; justify-content:center; gap:8px; margin-bottom:32px; flex-wrap:wrap; }
  .rtag {
    font-size:11px; padding:3px 12px; border-radius:20px;
    border:1px solid var(--border); color:var(--muted); background: var(--surface2);
  }
  #game-area { display: none; }
  #game-area.visible { display: block; }
</style>
</head>
<body>
<div id="app">

  <div id="screen-intro" class="screen visible">
    <div class="screen-title" style="color:var(--text)">경로<span style="color:var(--accent)">_</span>기억</div>
    <div class="screen-sub">표시되는 경로를 기억하고<br>사라진 뒤 순서대로 따라가세요.<br><br>4라운드 — 모두 클리어하면 성공!</div>
    <div class="round-tags">
      <div class="rtag">R1 · 5칸</div><div class="rtag">R2 · 8칸</div>
      <div class="rtag">R3 · 12칸</div><div class="rtag">R4 · 20칸</div>
    </div>
    <button class="btn primary" onclick="initGame()">게임 시작</button>
  </div>

  <div id="screen-clear" class="screen">
    <div class="screen-title clear">ALL CLEAR</div>
    <div class="screen-sub" id="clear-sub"></div>
    <button class="btn primary" onclick="initGame()">다시 하기</button>
  </div>

  <div id="screen-fail" class="screen">
    <div class="screen-title fail">탈락</div>
    <div class="screen-sub" id="fail-sub"></div>
    <button class="btn primary" onclick="initGame()">다시 하기</button>
  </div>

  <div id="game-area">
    <div class="header">
      <div class="title">경로<span>_</span>기억</div>
      <div class="subtitle">Path Memory Game · 6×8</div>
    </div>

    <div class="rounds-row">
      <div class="round-pip" id="pip-0"></div>
      <div class="round-pip" id="pip-1"></div>
      <div class="round-pip" id="pip-2"></div>
      <div class="round-pip" id="pip-3"></div>
    </div>

    <div class="status-bar">
      <div class="status-msg" id="status-msg">준비 중...</div>
      <div class="chips">
        <div class="chip">라운드 <strong id="round-disp">1</strong>/4</div>
        <div class="chip">경로 <strong id="len-disp">5</strong>칸</div>
        <div class="chip"><span id="timer-num">—</span>초</div>
      </div>
    </div>

    <div class="grid-outer">
      <div id="grid"></div>
      <div id="next-overlay">
        <div class="next-label" id="next-label-txt">라운드 클리어!</div>
        <div class="next-sub">자동으로 넘어갑니다</div>
        <div class="next-countdown" id="next-cd">5</div>
        <button id="btn-next-round" onclick="proceedNext()">다음 라운드 →</button>
      </div>
    </div>


  </div>

</div>
<script>
const COLS = 6, ROWS = 8;
const ROUNDS = [5, 8, 12, 20];
const SHOW_TOTAL_MS = 2000; // fixed 2s total show time
const TIMER_PER_CELL = 4;
const dirs = [[0,1],[0,-1],[1,0],[-1,0]];

let round = 0, path = [], userPath = [], phase = 'idle';
let timerInterval = null, nextCdInterval = null, timeLeft = 0;

/* ── HELPERS ── */
const $ = id => document.getElementById(id);
const cell = (r,c) => $(`c${r}_${c}`);

function show(id) {
  ['screen-intro','screen-clear','screen-fail','game-area'].forEach(s => {
    const el = $(s);
    if (s === 'game-area') { el.style.display=''; el.classList.remove('visible'); }
    else el.classList.remove('visible');
  });
  const el = $(id);
  if (id === 'game-area') { el.style.display='block'; el.classList.add('visible'); }
  else el.classList.add('visible');
}

function setStatus(msg, cls) {
  const el = $('status-msg');
  el.textContent = msg;
  el.className = 'status-msg' + (cls ? ' '+cls : '');
}



/* ── GRID ── */
function buildGrid() {
  const g = $('grid'); g.innerHTML = '';
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    const d = document.createElement('div');
    d.className = 'cell'; d.id = `c${r}_${c}`;
    d.innerHTML = '<div class="dot"></div>';
    g.appendChild(d);
  }
}

function clearAll() {
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    const el = cell(r,c);
    el.className = 'cell'; el.onclick = null;
    el.innerHTML = '<div class="dot"></div>';
  }
}

/* ── PATH ── */
function genPath(len) {
  for (let t=0; t<800; t++) {
    let r=Math.floor(Math.random()*ROWS), c=Math.floor(Math.random()*COLS);
    let p=[[r,c]], vis=new Set([`${r},${c}`]), ok=true;
    for (let i=1; i<len; i++) {
      const sh=dirs.slice().sort(()=>Math.random()-.5);
      let moved=false;
      for (let [dr,dc] of sh) {
        const nr=r+dr, nc=c+dc;
        if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!vis.has(`${nr},${nc}`)) {
          r=nr; c=nc; p.push([r,c]); vis.add(`${r},${c}`); moved=true; break;
        }
      }
      if (!moved){ok=false; break;}
    }
    if (ok && p.length===len) return p;
  }
  return null;
}

/* ── PIPS ── */
function resetPips(activeIdx) {
  for (let i=0; i<4; i++) {
    const pip=$(`pip-${i}`);
    pip.className='round-pip';
    pip.style.removeProperty('--dur');
    if (i < activeIdx) pip.classList.add('done');
  }
}
function activatePipTimer(idx) {
  const pip=$(`pip-${idx}`);
  const secs=TIMER_PER_CELL*ROUNDS[idx];
  pip.style.setProperty('--dur', secs+'s');
  void pip.offsetWidth;
  pip.classList.add('active');
}

/* ── TIMER ── */
function stopTimer(){clearInterval(timerInterval);timerInterval=null;}
function startTimer(secs, onEnd){
  stopTimer(); timeLeft=secs;
  const el=$('timer-num'); el.textContent=timeLeft; el.className='';
  timerInterval=setInterval(()=>{
    timeLeft--;
    el.textContent=timeLeft;
    if(timeLeft<=5) el.className='urgent';
    if(timeLeft<=0){stopTimer(); onEnd();}
  },1000);
}

/* ── INIT ── */
function initGame(){
  round=0;
  show('game-area');
  hideNextOverlay();
  buildGrid();
  startRound();
}

/* ── ROUND ── */
function startRound(){
  clearAll(); stopTimer(); hideNextOverlay();
  $('timer-num').textContent='—'; $('timer-num').className='';
  const len=ROUNDS[round];
  $('round-disp').textContent=round+1;
  $('len-disp').textContent=len;
  resetPips(round);
  path=genPath(len);
  if(!path){setStatus('경로 생성 오류');return;}

  phase='show';
  setStatus('경로를 기억하세요!','hi');

  // interval per cell so total ≈ 2000ms
  const interval=Math.floor(SHOW_TOTAL_MS/len);
  let i=0;
  function tick(){
    // deactivate previous (make it path-show = dimmer)
    if(i>0){
      const [pr,pc]=path[i-1];
      const prev=cell(pr,pc);
      prev.classList.remove('path-active');
      prev.classList.add('path-show');
    }
    if(i<path.length){
      const [r,c]=path[i];
      const el=cell(r,c);
      el.classList.add('path-active');
      // start/end markers
      if(i===0) el.classList.add('start');
      if(i===path.length-1) el.classList.add('end');
      i++;
      setTimeout(tick, interval);
    } else {
      // finalise last cell
      const [lr,lc]=path[path.length-1];
      cell(lr,lc).classList.remove('path-active');
      cell(lr,lc).classList.add('path-show','end');
      // wait 1s then hide and start input
      setTimeout(hideAndInput, 1000);
    }
  }
  tick();
}

/* ── INPUT ── */
function hideAndInput(){
  clearAll();
  const [sr,sc]=path[0],[er,ec]=path[path.length-1];
  cell(sr,sc).classList.add('start');
  cell(er,ec).classList.add('end');

  phase='input'; userPath=[[sr,sc]];
  cell(sr,sc).classList.add('selected-ok');

  setStatus('경로를 순서대로 클릭하세요!');
  resetPips(round); activatePipTimer(round);

  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(r===sr&&c===sc) continue;
    const el=cell(r,c);
    el.classList.add('clickable');
    el.onclick=()=>clickCell(r,c);
  }
  startTimer(TIMER_PER_CELL*ROUNDS[round],()=>{if(phase==='input')submitAnswer(true);});
}

function clickCell(r,c){
  if(phase!=='input') return;
  const [lr,lc]=userPath[userPath.length-1];
  if(Math.abs(r-lr)+Math.abs(c-lc)!==1) return;
  if(userPath.some(([pr,pc])=>pr===r&&pc===c)) return;
  userPath.push([r,c]);
  const el=cell(r,c);
  el.classList.add('selected-ok','flash-ok');
  setTimeout(()=>el.classList.remove('flash-ok'),220);
  if(userPath.length>=path.length) setTimeout(()=>submitAnswer(false),150);
}

/* ── SUBMIT ── */

function submitAnswer(timedOut){
  if(phase!=='input') return;
  phase='result'; stopTimer();
  $('timer-num').textContent='—'; $('timer-num').className='';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){cell(r,c).classList.remove('clickable');cell(r,c).onclick=null;}

  let correct=0;
  path.forEach(([r,c],i)=>{
    const el=cell(r,c);
    const matched=userPath[i]&&userPath[i][0]===r&&userPath[i][1]===c;
    el.className='cell'; el.innerHTML='<div class="dot"></div>';
    el.classList.add(matched?'correct-reveal':'wrong-reveal');
    if(matched) correct++;
  });
  userPath.forEach(([r,c])=>{
    if(!path.some(([pr,pc])=>pr===r&&pc===c)){
      const el=cell(r,c);
      el.className='cell wrong-reveal';
      el.innerHTML='<div class="dot"></div>';
    }
  });

  const passed=correct===path.length;
  const pct=Math.round(correct/path.length*100);
  if(timedOut)    setStatus('⏱ 시간 초과!','bad');
  else if(passed) setStatus(`✓ 완벽! ${correct}/${path.length}`,'hi');
  else            setStatus(`✗ ${correct}/${path.length} 정답 (${pct}%)`,'bad');

  // 1초 후 결과 처리
  setTimeout(()=>{
    if(passed){
      $(`pip-${round}`).className='round-pip done';
      round++;
      phase='next';
      if(round>=4){ showClear(); }
      else { showNextOverlay(); }
    } else {
      $(`pip-${round}`).className='round-pip fail';
      phase='fail';
      showFail();
    }
  },1000);
}

/* ── NEXT OVERLAY ── */
function showNextOverlay(){
  $('next-label-txt').textContent=`라운드 ${round} 클리어!`;
  const cd=$('next-cd');
  let t=5; cd.textContent=t; cd.className='next-countdown';
  $('next-overlay').classList.add('visible');
  clearInterval(nextCdInterval);
  nextCdInterval=setInterval(()=>{
    t--;
    cd.textContent=t;
    if(t<=2) cd.className='next-countdown urgent';
    if(t<=0){clearInterval(nextCdInterval); proceedNext();}
  },1000);
}

function hideNextOverlay(){
  clearInterval(nextCdInterval);
  $('next-overlay').classList.remove('visible');
}

function proceedNext(){hideNextOverlay(); startRound();}

/* ── END ── */
function showClear(){
  show('screen-clear');
  $('clear-sub').textContent='4라운드 모두 클리어!\n경로 5 → 8 → 12 → 20칸\n전부 성공했습니다.';
}
function showFail(){
  show('screen-fail');
  $('fail-sub').textContent=`라운드 ${round+1} (${ROUNDS[round]}칸) 에서 탈락했습니다.\n다시 도전해보세요!`;
}
</script>
</body>
</html>
