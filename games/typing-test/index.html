<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>타자 연습</title>
  <link rel="stylesheet" href="../../shared/common.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a href="../../index.html" class="back-link">← 게임 목록</a>
  <div id="app">
    <div id="start-screen" class="screen active">
      <div class="brand">Typing Game</div>
      <div class="title-main">⌨️ 타자 연습</div>
      <div class="title-sub">60초 안에 최고 WPM을 달성하세요!</div>
      <div class="rule-card">
        <div class="rule-item"><div class="rule-dot">1</div><span>단어가 표시되면 정확하게 입력하고 Space 또는 Enter.</span></div>
        <div class="rule-item"><div class="rule-dot">2</div><span>정확도와 속도 모두 점수에 영향을 줍니다.</span></div>
      </div>
      <button id="start-btn" class="btn-start">시작하기 →</button>
    </div>
    <div id="game-screen" class="screen">
      <div class="hud">
        <div class="hud-item"><span class="hud-label">시간</span><span class="hud-val" id="timer">60</span></div>
        <div class="hud-item"><span class="hud-label">WPM</span><span class="hud-val" id="wpm">0</span></div>
        <div class="hud-item"><span class="hud-label">정확도</span><span class="hud-val" id="acc">100%</span></div>
        <div class="hud-item"><span class="hud-label">최고 WPM</span><span class="hud-val" id="best">0</span></div>
      </div>
      <div id="login-status" class="login-status"></div>
      <div id="word-display"></div>
      <div id="upcoming"></div>
      <input id="input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="여기에 입력하세요...">
    </div>
    <div id="result-screen" class="screen">
      <div class="result-card">
        <div id="r-emoji" class="r-emoji"></div>
        <div id="r-wpm" class="r-wpm"></div>
        <div id="r-sub" class="r-sub"></div>
      </div>
      <button id="retry-btn" class="btn-start">다시하기 →</button>
    </div>
  </div>
  <script type="module" src="./game.js"></script>
</body>
</html>
